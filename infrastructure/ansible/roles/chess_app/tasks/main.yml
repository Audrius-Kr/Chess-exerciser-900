---
- name: Create chess-app system user
  ansible.builtin.user:
    name: "{{ app_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Clone or update application repository
  ansible.builtin.git:
    repo: "{{ repo_url }}"
    dest: "{{ src_dir }}"
    version: "{{ repo_branch }}"
    depth: 1
    force: true

- name: Publish .NET application
  ansible.builtin.command:
    cmd: "{{ dotnet_dir }}/dotnet publish backend/ -c Release -o {{ app_dir }}"
    chdir: "{{ src_dir }}"
  environment:
    DOTNET_ROOT: "{{ dotnet_dir }}"
    PATH: "{{ dotnet_dir }}:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin"

- name: Template production appsettings
  ansible.builtin.template:
    src: appsettings.Production.json.j2
    dest: "{{ app_dir }}/appsettings.Production.json"
    mode: "0640"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"

- name: Set ownership on app directory
  ansible.builtin.file:
    path: "{{ app_dir }}"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    recurse: true

- name: Drop and recreate database for clean migration
  ansible.builtin.shell: >
    mysql -u root -p'{{ vault_mysql_root_password }}'
    -e "DROP DATABASE IF EXISTS {{ mysql_db_name }}; CREATE DATABASE {{ mysql_db_name }};"
  no_log: true

- name: Restore dotnet local tools
  ansible.builtin.command:
    cmd: "{{ dotnet_dir }}/dotnet tool restore"
    chdir: "{{ src_dir }}/backend"
  environment:
    DOTNET_ROOT: "{{ dotnet_dir }}"
    PATH: "{{ dotnet_dir }}:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin"

- name: Run EF Core database migrations
  ansible.builtin.command:
    cmd: "{{ dotnet_dir }}/dotnet tool run dotnet-ef database update"
    chdir: "{{ src_dir }}/backend"
  environment:
    DOTNET_ROOT: "{{ dotnet_dir }}"
    PATH: "{{ dotnet_dir }}:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin"
    ASPNETCORE_ENVIRONMENT: Production
    ConnectionStrings__ChessPortal: "server=localhost;port=3306;database={{ mysql_db_name }};uid={{ mysql_app_user }};pwd={{ vault_mysql_app_password }};"

- name: Install chess-exerciser systemd service
  ansible.builtin.template:
    src: chess-exerciser.service.j2
    dest: /etc/systemd/system/chess-exerciser.service
    mode: "0644"
  notify: Restart chess-exerciser

- name: Install nginx site config
  ansible.builtin.template:
    src: nginx-chess.conf.j2
    dest: /etc/nginx/conf.d/chess.conf
    mode: "0644"
  notify: Reload nginx

- name: Enable and start chess-exerciser
  ansible.builtin.systemd:
    name: chess-exerciser
    daemon_reload: true
    enabled: true
    state: started

- name: Enable and start nginx
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
